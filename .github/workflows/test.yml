name: test

on:
  push:
    branches:
      - master
    paths-ignore:
      - "VietTypeConfig2/**"
      - "VietTypeATL/**"
      - "VietTypeSetup/**"
      # unconditional
      - "TfDumper/**"
      - "WordLister/**"
      - "data/**"
      - "docs/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions: {}

env:
  SOLUTION_FILE_PATH: .

jobs:
  test:
    runs-on: "${{matrix.platform == 'ARM64EC' && 'windows-11-arm' || 'windows-latest'}}"
    strategy:
      matrix:
        configuration:
          - Debug
          - Release
        platform:
          - Win32
          - x64
          #- ARM64EC

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3

      - name: Build unit tests
        run: msbuild.exe -m -target:VietTypeUnitTests:Rebuild -p:Configuration=${{matrix.configuration}} -p:Platform=${{matrix.platform}} .

      - name: Run tests
        run: |
          cd VietTypeUnitTests
          ../${{matrix.platform}}/${{matrix.configuration}}/VietTypeUnitTests.exe
